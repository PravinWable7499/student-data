<!DOCTYPE html>
<html>
<head>
  <title>Student Form</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    .form-box {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .title {
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
      color: #333;
    }

    .btn-custom {
      width: 100%;
      background: #4e73df;
      color: #fff;
    }

    .btn-custom:hover {
      background: #2e59d9;
    }
  </style>
</head>

<body>

<div class="form-box">
  <h3 class="title">Student Registration Form</h3>

  <form id="myForm">

    <div class="mb-3">
      <input type="text" id="name" class="form-control" placeholder="Your Name" required>
    </div>

    <div class="mb-3">
      <input type="email" id="email" class="form-control" placeholder="Gmail" required>
    </div>

    <div class="mb-3">
      <input type="text" id="phone" class="form-control" placeholder="Phone No" required>
    </div>

    <div class="mb-3">
      <input type="text" id="college" class="form-control" placeholder="College Name" required>
    </div>

    <!-- <div class="mb-3">
      <input type="text" id="course" class="form-control" placeholder="Interested Course" required>
    </div> -->

    <div class="mb-3">
    <label class="form-label">Select Course(s)</label>

    <select id="course" class="form-control" multiple required>
        <option value="Data Analytics">Data Analytics</option>
        <option value="Data Science">Data Science</option>
        <option value="Python Development">Python Development</option>
        <option value="Web Development">Web Development</option>
        <option value="Full Stack Development">Full Stack Development</option>
    </select>

    <small class="text-muted">
        Hold Ctrl (Windows) / Cmd (Mac) to select multiple courses
    </small>
    </div>

    <button type="submit" class="btn btn-custom">Submit</button>

  </form>
</div>
<script>document.getElementById("myForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const data = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            college: document.getElementById("college").value,
            course: document.getElementById("course").value
        };

        try {
            const response = await fetch("https://script.google.com/macros/s/AKfycbyx6iBWaCqEAxuigblhAzOSXY0X1xwkAC-nsDqvtQ4dmr_pgvsin4_J_06suuZc5_3Jpg/exec", {
                method: "POST",
                body: JSON.stringify(data)
            });

            const result = await response.text();
            alert(result);
        } catch (err) {
            alert(err.message);
            console.log(err);
        }
    });
    </script>

</body>
</html>
