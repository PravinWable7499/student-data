<!DOCTYPE html>
<html>
<head>
  <title>Contact Form</title>
</head>
<body>

<h2>Contact Form</h2>

<form id="myForm">
  <input type="text" id="name" placeholder="Name" required><br><br>
  <input type="email" id="email" placeholder="Email" required><br><br>
  <input type="text" id="phone" placeholder="Phone" required><br><br>
  <textarea id="message" placeholder="Message"></textarea><br><br>

  <button type="submit">Submit</button>
</form>




<script>
    document.getElementById("myForm").addEventListener("submit", function(e) {
  e.preventDefault();

  fetch("https://script.google.com/macros/s/AKfycbzL9JudWaT5WoiWEuAUZwoGNHFJk1icwjFMv6oCJO1YsYV5RguPrhtdKsLfg7g3i1WS/exec", {
    method: "POST",
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      phone: document.getElementById("phone").value,
      message: document.getElementById("message").value
    })
  })
  .then(res => res.text())
  .then(data => {
    console.log("Response:", data);
    alert("Data Submitted Successfully!");
    document.getElementById("myForm").reset();
  })
  .catch(err => {
    console.error("Error:", err);
    alert("Error submitting form!");
  });
});
</script>

</body>
</html>
